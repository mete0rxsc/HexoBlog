# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: -Mete0r's Blog | 壹人小站-
subtitle: '今人不见古时月，今月曾经照古人'
description: 'Mete0r-欢迎来到我的虚拟小世界'
favicon: "https://img.xscnet.cn//i/2025/10/30/6903707e73637.png"
avatar: "https://img.xscnet.cn//i/2025/07/09/686e64ec429db.png"
keywords: Meter0r
author: Mete0r
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://www.xscnet.cn/
permalink: posts/:title/ #:year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: stellar

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
# .//_config.yml
deploy:
  type: git
  repo: https://github.com/mete0rxsc/HexoSite.git
  branch: master # 部署分支，通常是 main 或 master
  message: "Site updated: {{ now('YYYY-MM-DD HH:mm:ss') }}" # 可选，自定义提交信息

#订阅RSS
feed:
  type: atom
  path: atom.xml
  limit: false

# hexo-safego安全跳转插件
# see https://blog.liushen.fun/posts/1dfd1f41/
hexo_safego:
  # 基本功能设置
  general:
    enable: true                # 启用插件
    enable_base64_encode: true  # 使用 Base64 编码
    enable_target_blank: true   # 从新窗口打开跳转页面

  # 安全设置
  security:
    url_param_name: 'url'         # URL 参数名
    html_file_name: 'go.html'   # 重定向页面的文件名
    ignore_attrs:               # 忽略处理的 HTML 结构
      - 'data-fancybox'

  # 容器与页面设置
  scope:
    # apply_containers:           # 应用的容器选择器
      # - '#article-container'
    apply_pages:                # 应用的页面路径
      - "/"

    exclude_pages:              # 排除的页面路径

  # 域名白名单
  whitelist:
    domain_whitelist:           # 允许的白名单域名，通过字符串匹配实现
      - "xscnet.cn"
      - "xscnas.top"
      - "liushen.fun"
      - "koxiuqiu.cn"
      - "beian.miit.gov.cn"
      - "blogscn.fun"
      - "foreverblog.cn"
      - "travellings.cn"
      - "travel.moe"

  # 页面外观设置
  appearance:
    avatar: https://img.xscnet.cn//i/2025/10/30/6903707e73637.png    # 跳转页面头像路径
    title: "跳转中..."            # 跳转页面标题
    subtitle: "安全跳转"         # 跳转页面副标题
    darkmode: auto              # 是否启用深色模式
    countdowntime: 10            # 跳转页面倒计时秒数，如果设置为负数则为不自动跳转

  # 调试设置
  debug:
    enable: false               # 启用调试模式

# LivePhoto动图
livephoto:
  enable: true
  autoplay: true          # 是否自动播放（当进入视口时）
  hover_to_play: true     # 鼠标悬停在图片上时播放视频
  click_to_play: true     # 点击图片时播放视频（移动端主要依赖这个）
  lazy_load: true         # 是否启用懒加载（图片进入可视区域才加载视频，提高性能）
  threshold: 0.7          # 懒加载触发比例（0.8 表示图片有 80% 进入视口才开始加载）
  badge: true             # 是否在图片上显示 “Live” 标识
  badge_text: 'Live'      # 标识文字
  badge_position: 'bottom-left' # 标识位置: bottom-left, bottom-right, top-left, top-right
  loading_animation: true # 是否显示加载动画
  preload: 'auto'         # video 的 preload 行为  # auto = 浏览器自动预加载  # metadata = 只加载元数据  # none = 不预加载
  keep_observing: false   # 是否持续监听元素可见性  # true = 每次进入视口都会检测  # false = 加载一次就停止监听（性能更好）
  hover_delay: 300        # 悬停延迟（毫秒）
  weixin_disable_autoplay: true # 是否禁用微信内置浏览器的自动播放